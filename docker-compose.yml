services:
  agent:
    build:
      context: ./agent
      dockerfile: Dockerfile
    container_name: neurovault-agent
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file:
      - ./agent/.env
    environment:
      - NODE_ENV=production
      - PORT=3001
      - HOST=0.0.0.0
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3001/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: neurovault-cloudflared
    profiles:
      - tunnel
    restart: unless-stopped
    depends_on:
      agent:
        condition: service_healthy
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN:-}
    environment:
      - TUNNEL_METRICS=0.0.0.0:2000
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
